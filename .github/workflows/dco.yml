name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a commit SHA (not a mutable major tag); bump SHA + comment together.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Verify Developer Certificate of Origin sign-off
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          # Non-merge commits this PR introduces (merge commits are exempt).
          commits=$(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")
          if [ -z "$commits" ]; then
            echo "No commits to check."
            exit 0
          fi
          for sha in $commits; do
            subject=$(git show -s --format='%s' "$sha")
            author_email=$(git show -s --format='%ae' "$sha")
            signoffs=$(git show -s --format='%B' "$sha" | grep -i '^Signed-off-by:' || true)
            if [ -z "$signoffs" ]; then
              echo "::error::${sha} — \"${subject}\": missing a Signed-off-by line."
              fail=1
              continue
            fi
            if ! printf '%s\n' "$signoffs" | grep -iqF "<${author_email}>"; then
              echo "::error::${sha} — \"${subject}\": no Signed-off-by matching author <${author_email}>."
              printf '          found: %s\n' "$signoffs"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "Every commit must carry a Developer Certificate of Origin sign-off."
            echo "Fix with:  git commit --amend -s            (last commit)"
            echo "      or:  git rebase --signoff ${BASE_SHA}  (all PR commits)"
            echo "See CONTRIBUTING.md."
            exit 1
          fi
          echo "DCO: all commits signed off."
